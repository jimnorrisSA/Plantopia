<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />

  <title>Plantopia</title>
  <meta name="description" content="Plant pixel art in the real world" />

  <!-- PWA manifest -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />

  <!-- Theme colour -->
  <meta name="theme-color" content="#51cf66" />

  <!-- iOS PWA settings -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Plantopia" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { margin: 0; overscroll-behavior: none; }
    #root {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/sw.js");
      });
    }
  </script>
</body>
</html>
